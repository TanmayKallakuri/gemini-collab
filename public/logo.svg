<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="50%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="spark" x1="200" y1="80" x2="350" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#E0D4FF"/>
    </linearGradient>
    <linearGradient id="bubble1" x1="100" y1="280" x2="280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E8E0FF" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="bubble2" x1="240" y1="300" x2="420" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#D4C8FF" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Gemini sparkle/star -->
  <path d="M256 72 C256 72 280 160 296 192 C312 224 360 248 360 248 C360 248 312 272 296 304 C280 336 256 424 256 424 C256 424 232 336 216 304 C200 272 152 248 152 248 C152 248 200 224 216 192 C232 160 256 72 256 72Z" fill="url(#spark)" opacity="0.9"/>
  <!-- Small sparkle accent -->
  <path d="M380 100 C380 100 388 128 394 140 C400 152 420 160 420 160 C420 160 400 168 394 180 C388 192 380 220 380 220 C380 220 372 192 366 180 C360 168 340 160 340 160 C340 160 360 152 366 140 C372 128 380 100 380 100Z" fill="white" opacity="0.6"/>
  <!-- Chat bubble left -->
  <rect x="100" y="310" width="170" height="90" rx="20" fill="url(#bubble1)"/>
  <polygon points="140,400 130,435 170,400" fill="url(#bubble1)"/>
  <!-- Chat dots in left bubble -->
  <circle cx="155" cy="355" r="10" fill="#7B61FF" opacity="0.6"/>
  <circle cx="185" cy="355" r="10" fill="#7B61FF" opacity="0.45"/>
  <circle cx="215" cy="355" r="10" fill="#7B61FF" opacity="0.3"/>
  <!-- Chat bubble right -->
  <rect x="240" y="340" width="160" height="80" rx="20" fill="url(#bubble2)"/>
  <polygon points="360,420 370,450 330,420" fill="url(#bubble2)"/>
  <!-- Chat dots in right bubble -->
  <circle cx="295" cy="380" r="9" fill="#A855F7" opacity="0.5"/>
  <circle cx="322" cy="380" r="9" fill="#A855F7" opacity="0.35"/>
  <circle cx="349" cy="380" r="9" fill="#A855F7" opacity="0.2"/>
</svg>
